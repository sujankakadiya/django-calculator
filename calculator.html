<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.calculator {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

label {
    font-weight: bold;
}

.form-control {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

.form-control:focus {
    border-color: #667eea;
    box-shadow: 0 0 5px #667eea;
}

button {
    width: 100%;
    padding: 12px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
}

input[readonly] {
    background: #f3f3f3;
    font-weight: bold;
}
</style>

</head>
<body>
    
<div class="calculator">
    <h1>Calculator</h1>

    <form method="post">
        {% csrf_token %}

<div>
    <label>subject1</label>
    <input type="text" name="subject1" class="form-control">
</div>

<br/>

<div>
    <label>subject2</label>
    <input type="text" name="subject2" class="form-control">
</div>

<br/>

<div>
    <label>subject3</label>
    <input type="text" name="subject3" class="form-control">
</div>

<br/>

<div>
    <label>subject4</label>
    <input type="text" name="subject4" class="form-control">
</div>

<br/>

<div>
    <label>subject5</label>
    <input type="text" name="subject5" class="form-control">
</div>

<br/>

<button type="submit">marksheet</button> 

<br/><br/>

<label>total</label>
<input type="text" value="{{total}}" class="form-control">

<br/>

<label>per</label>
<input type="text" value="{{per}}" class="form-control">

<br/>

<label>division</label>
<input type="text" value="{{div}}" class="form-control">

    </form>

</div>

</body>
</html>
