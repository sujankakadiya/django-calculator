<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>

<style>

    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.calculator {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 320px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
}

.output {
    margin-top: 15px;
    font-weight: bold;
    text-align: center;
    font-size: 18px;
    color: #333;
}
</style> -->

</head>
<body>

<div class="calculator">
    <h1>Calculator</h1>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="num1" value="{{n1}}" placeholder="Enter first number">

        <select name="opr">
            <option value="+">Addition (+)</option>
            <option value="-">Subtraction (-)</option>
            <option value="*">Multiplication (*)</option>
            <option value="/">Division (/)</option>
        </select>

        <input type="text" name="num2" value="{{n2}}" placeholder="Enter second number">

        <button type="submit">Calculate</button>

        <div class="output">
            Result: {{c}}
        </div>
    </form>
</div>

</body>
</html>
